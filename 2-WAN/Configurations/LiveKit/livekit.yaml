    port_range_start: 50100
    port_range_end: 50200
    use_external_ip: true
    enable_loopback_candidate: false
    turn_servers:
        - host: turn.domain.tld
          protocol: tcp
          port: 3478
          secret: "example"
        - host: turn.domain.tld
          protocol: udp
          port: 3478
          secret: "example"
        - host: turn.domain.tld
          protocol: tls
          port: 5349
          secret: "example"
room:
    auto_create: true
    max_participants: 100
    empty_timeout: 300
keys:
    mySecretName: mySecretKeyThatIsAtLeast32CharactersLongOrMore
